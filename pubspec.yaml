name: financeapp
description: Controle financeiro pessoal offline

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.9.0
  intl: ^0.20.2
  fl_chart: ^1.2.0
  share_plus: ^12.0.2
  path_provider: ^2.1.2
  uuid: ^4.3.3
  flutter_local_notifications: ^17.0.0
  font_awesome_flutter: ^10.6.0
  timezone: ^0.9.0
  csv: ^6.0.0
  file_picker: ^8.0.0
  local_auth: ^2.3.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true          # gera ícones para Android
  ios: true              # gera ícones para iOS
  image_path: "assets/images/icon.png" # substitua pelo caminho da sua imagem
  min_sdk_android: 21    # evita warnings no Android